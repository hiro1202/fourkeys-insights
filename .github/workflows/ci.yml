name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Lint
        run: staticcheck ./...

      - name: Test with coverage
        run: |
          CGO_ENABLED=1 go test ./... -coverprofile=coverage.out -covermode=atomic -v 2>&1 | tee test-output.txt

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          TOTAL=$(grep ^total coverage-summary.txt | awk '{print $NF}')
          echo "COVERAGE=$TOTAL" >> $GITHUB_ENV

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('backend/test-output.txt', 'utf8');
            const coverageSummary = fs.readFileSync('backend/coverage-summary.txt', 'utf8');

            // Count test results
            const passed = (testOutput.match(/--- PASS/g) || []).length;
            const failed = (testOutput.match(/--- FAIL/g) || []).length;
            const total = passed + failed;

            const coverage = process.env.COVERAGE || 'unknown';
            const status = failed > 0 ? '❌' : '✅';

            // Build per-package coverage table
            const lines = coverageSummary.split('\n').filter(l => l.trim());
            let table = '| Package | Coverage |\n|---------|----------|\n';
            for (const line of lines) {
              const match = line.match(/^(\S+)\s+\S+\s+(\S+)$/);
              if (match) {
                const pkg = match[1].replace('github.com/hiro1202/fourkeys-insights/', '');
                table += `| \`${pkg}\` | ${match[2]} |\n`;
              }
            }

            const body = [
              `## ${status} Backend Test Results`,
              '',
              `**Tests:** ${passed} passed, ${failed} failed (${total} total)`,
              `**Coverage:** ${coverage}`,
              '',
              '<details>',
              '<summary>Coverage by package</summary>',
              '',
              table,
              '</details>',
              '',
              '<details>',
              '<summary>Test output</summary>',
              '',
              '```',
              testOutput.slice(-3000),
              '```',
              '</details>',
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Backend Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: i18n key validation
        run: node scripts/check-i18n.js

      - name: Build
        run: npx vite build
