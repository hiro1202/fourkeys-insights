name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        id: tsc
        run: |
          npx tsc --noEmit 2>&1 | tee tsc-output.txt
        continue-on-error: true

      - name: i18n key validation
        id: i18n
        run: |
          node scripts/check-i18n.js 2>&1 | tee i18n-output.txt
        continue-on-error: true

      - name: Build
        id: build
        run: |
          npx vite build 2>&1 | tee build-output.txt
        continue-on-error: true

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (f) => { try { return fs.readFileSync(`frontend/${f}`, 'utf8'); } catch { return ''; } };

            const tscOut = read('tsc-output.txt');
            const i18nOut = read('i18n-output.txt');
            const buildOut = read('build-output.txt');

            const tscOk = '${{ steps.tsc.outcome }}' === 'success';
            const i18nOk = '${{ steps.i18n.outcome }}' === 'success';
            const buildOk = '${{ steps.build.outcome }}' === 'success';
            const allOk = tscOk && i18nOk && buildOk;

            const icon = (ok) => ok ? '✅' : '❌';
            const status = allOk ? '✅' : '❌';

            const body = [
              `## ${status} Frontend Check Results`,
              '',
              `| Check | Status |`,
              `|-------|--------|`,
              `| TypeScript | ${icon(tscOk)} |`,
              `| i18n keys | ${icon(i18nOk)} |`,
              `| Vite build | ${icon(buildOk)} |`,
              '',
              ...(!tscOk ? [
                '<details>',
                '<summary>TypeScript errors</summary>',
                '',
                '```',
                tscOut.slice(-3000),
                '```',
                '</details>',
                '',
              ] : []),
              ...(!i18nOk ? [
                '<details>',
                '<summary>i18n errors</summary>',
                '',
                '```',
                i18nOut.slice(-3000),
                '```',
                '</details>',
                '',
              ] : []),
              ...(!buildOk ? [
                '<details>',
                '<summary>Build errors</summary>',
                '',
                '```',
                buildOut.slice(-3000),
                '```',
                '</details>',
                '',
              ] : []),
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Frontend Check Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if checks failed
        if: steps.tsc.outcome == 'failure' || steps.i18n.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1

  backend:
    name: Backend (Go)
    needs: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/static/dist

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files not formatted with gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Lint
        run: staticcheck ./...

      - name: Test with coverage
        run: |
          set -o pipefail
          CGO_ENABLED=1 go test ./... -coverprofile=coverage.out -covermode=atomic -v 2>&1 | tee test-output.txt

      - name: Generate coverage report
        run: |
          go tool cover -func=coverage.out | tee coverage-summary.txt
          TOTAL=$(grep ^total coverage-summary.txt | awk '{print $NF}')
          echo "COVERAGE=$TOTAL" >> $GITHUB_ENV

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testOutput = fs.readFileSync('backend/test-output.txt', 'utf8');
            const coverageSummary = fs.readFileSync('backend/coverage-summary.txt', 'utf8');

            // Count test results
            const passed = (testOutput.match(/--- PASS/g) || []).length;
            const failed = (testOutput.match(/--- FAIL/g) || []).length;
            const total = passed + failed;

            const coverage = process.env.COVERAGE || 'unknown';
            const status = failed > 0 ? '❌' : '✅';

            // Build per-package coverage table
            const lines = coverageSummary.split('\n').filter(l => l.trim());
            let table = '| Package | Coverage |\n|---------|----------|\n';
            for (const line of lines) {
              const match = line.match(/^(\S+)\s+\S+\s+(\S+)$/);
              if (match) {
                const pkg = match[1].replace('github.com/hiro1202/fourkeys-insights/', '');
                table += `| \`${pkg}\` | ${match[2]} |\n`;
              }
            }

            const body = [
              `## ${status} Backend Test Results`,
              '',
              `**Tests:** ${passed} passed, ${failed} failed (${total} total)`,
              `**Coverage:** ${coverage}`,
              '',
              '<details>',
              '<summary>Coverage by package</summary>',
              '',
              table,
              '</details>',
              '',
              '<details>',
              '<summary>Test output</summary>',
              '',
              '```',
              testOutput.slice(-3000),
              '```',
              '</details>',
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Backend Test Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

